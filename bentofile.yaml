service: "src.predict_energy_app.service:EnergyService"
description: "Modèle de prédiction de la consommation d'énergie des bâtiments non résidentiels de Seattle"
labels:
  owner: nassim
  project: seattle_energy

models:
  - "energy_regressor_rfr:latest"

include:
  - "src/"
  - "data/"
  - "pyproject.toml"

python:
  packages:
    - scikit-learn
    - pandas
    - numpy
    - pydantic
    - bentoml 

docker:
  env:
    PYTHONPATH: "/home/bentoml/bento/src"